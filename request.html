  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    :root { --sec-pad-x: 56px; --nav-gap: 14px; --nav-font: 12.5px; --logo-font: 17px; --cta-font: 12px; --cta-pad: 8px 12px; --header-pad: 18px 20px; }\n    @media (max-width: 900px) { :root { --sec-pad-x: 32px; } }\n    @media (max-width: 640px) {\n      :root { --sec-pad-x: 20px; --header-pad: 14px 14px; --nav-gap: 10px; --nav-font: 11px; --logo-font: 15px; --cta-font: 11px; --cta-pad: 8px 10px; }\n      .nav-desktop { display: none !important; }\n    }\n    body { margin: 0; background: oklch(98% 0.006 85); }\n    a { color: oklch(50% 0.1 195); text-decoration: none; }\n    a:hover { color: oklch(42% 0.1 195); }\n    * { box-sizing: border-box; }\n    img { max-width: 100%; }\n    .field-error { color: oklch(50% 0.18 25); font-size: 12.5px; margin: -4px 0 0; }\n    .field-invalid { border-color: oklch(55% 0.18 25) !important; }\n    input:focus, textarea:focus, select:focus { outline: none; border-color: oklch(50% 0.1 195) !important; box-shadow: 0 0 0 3px oklch(50% 0.1 195 / 0.15); }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family: 'Work Sans', sans-serif; color: oklch(26% 0.025 260); background: oklch(98% 0.006 85); min-height: 100vh;\">\n\n  <header style=\"position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; padding: var(--header-pad); border-bottom: 1px solid oklch(90% 0.01 85); gap: 10px; background: oklch(98% 0.006 85 / 0.94); backdrop-filter: blur(8px);\">\n    <a href=\"index.html\" style=\"display: flex; align-items: center; gap: 10px; flex-shrink: 0;\">\n      <img src=\"7e08beca-c769-4027-9c33-51f4b6e01d0e\" alt=\"\" style=\"height: 32px; width: auto; display: block;\">\n      <span style=\"font-family: 'Source Serif 4', serif; font-size: var(--logo-font); font-weight: 600; letter-spacing: -0.01em; color: oklch(26% 0.025 260);\">UpSkill Sprint<\u002Fspan>\n    <\u002Fa>\n    <nav class=\"nav-desktop\" style=\"display: flex; gap: var(--nav-gap); font-size: var(--nav-font); font-weight: 500; white-space: nowrap;\">\n      <a href=\"about.html\" style=\"padding: 6px 2px; border-bottom: 2px solid transparent;\" style-hover=\"border-bottom-color: oklch(50% 0.1 195); color: oklch(42% 0.1 195);\">About<\u002Fa>\n      <a href=\"lessons.html\" style=\"padding: 6px 2px; border-bottom: 2px solid transparent;\" style-hover=\"border-bottom-color: oklch(50% 0.1 195); color: oklch(42% 0.1 195);\">Lessons<\u002Fa>\n      <a href=\"services.html\" style=\"padding: 6px 2px; border-bottom: 2px solid transparent;\" style-hover=\"border-bottom-color: oklch(50% 0.1 195); color: oklch(42% 0.1 195);\">Services<\u002Fa>\n      <a href=\"request.html\" style=\"padding: 6px 2px; border-bottom: 2px solid oklch(50% 0.1 195); color: oklch(42% 0.1 195);\">Request a Topic<\u002Fa>\n      <a href=\"faq.html\" style=\"padding: 6px 2px; border-bottom: 2px solid transparent;\" style-hover=\"border-bottom-color: oklch(50% 0.1 195); color: oklch(42% 0.1 195);\">FAQ<\u002Fa>\n      <a href=\"contact.html\" style=\"padding: 6px 2px; border-bottom: 2px solid transparent;\" style-hover=\"border-bottom-color: oklch(50% 0.1 195); color: oklch(42% 0.1 195);\">Contact<\u002Fa>\n    <\u002Fnav>\n    <a href=\"lessons.html\" style=\"background: oklch(50% 0.1 195); color: oklch(98% 0.006 85); padding: var(--cta-pad); border-radius: 3px; font-size: var(--cta-font); font-weight: 600; white-space: nowrap;\" style-hover=\"background: oklch(42% 0.1 195);\">Start a 15-min lesson<\u002Fa>\n  <\u002Fheader>\n\n  <section data-screen-label=\"Request a Lesson\" style=\"padding: 96px var(--sec-pad-x); max-width: 720px; margin: 0 auto;\">\n    <p style=\"font-size: 14px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: oklch(50% 0.1 195); margin: 0 0 12px;\">Request a topic<\u002Fp>\n    <h1 style=\"font-family: 'Source Serif 4', serif; font-size: 30px; font-weight: 600; margin: 0 0 12px;\">Don't see what you need? Tell us what to build next.<\u002Fh1>\n    <p style=\"font-size: 15.5px; line-height: 1.6; color: oklch(40% 0.02 260); margin: 0 0 40px;\">Every request goes straight to our team and may be turned into a future lesson, guide, template, or training session.<\u002Fp>\n\n    <sc-if value=\"{{ !submitted }}\" hint-placeholder-val=\"{{ true }}\">\n      <form name=\"lesson-request\" method=\"POST\" data-netlify=\"true\" netlify-honeypot=\"bot-field\" onsubmit=\"{{ handleSubmit }}\" novalidate=\"true\" style=\"display: flex; flex-direction: column; gap: 22px;\">\n        <input type=\"hidden\" name=\"form-name\" value=\"lesson-request\">\n        <p style=\"display: none;\"><label>Don't fill this out: <input name=\"bot-field\"><\u002Flabel><\u002Fp>\n        <label style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <span style=\"font-size: 14px; font-weight: 600;\">What do you want to learn?<\u002Fspan>\n          <input type=\"text\" name=\"topic\" class=\"{{ topicErrClass }}\" placeholder=\"e.g. How to build a control chart in Excel\" style=\"padding: 13px 14px; border-radius: 3px; border: 1px solid oklch(80% 0.012 85); background: oklch(99% 0.004 85); font-size: 15px; font-family: inherit;\">\n          <sc-if value=\"{{ errors.topic }}\" hint-placeholder-val=\"{{ false }}\"><span class=\"field-error\">{{ errors.topic }}<\u002Fspan><\u002Fsc-if>\n        <\u002Flabel>\n        <label style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <span style=\"font-size: 14px; font-weight: 600;\">What problem are you trying to solve?<\u002Fspan>\n          <textarea name=\"problem\" class=\"{{ problemErrClass }}\" rows=\"3\" placeholder=\"Tell us the real situation at work you're dealing with\" style=\"padding: 13px 14px; border-radius: 3px; border: 1px solid oklch(80% 0.012 85); background: oklch(99% 0.004 85); font-size: 15px; font-family: inherit; resize: vertical;\"><\u002Ftextarea>\n          <sc-if value=\"{{ errors.problem }}\" hint-placeholder-val=\"{{ false }}\"><span class=\"field-error\">{{ errors.problem }}<\u002Fspan><\u002Fsc-if>\n        <\u002Flabel>\n        <label style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <span style=\"font-size: 14px; font-weight: 600;\">Your skill level<\u002Fspan>\n          <select name=\"skill_level\" class=\"{{ skillErrClass }}\" style=\"padding: 13px 14px; border-radius: 3px; border: 1px solid oklch(80% 0.012 85); background: oklch(99% 0.004 85); font-size: 15px; font-family: inherit;\">\n            <option value=\"\">Choose one<\u002Foption>\n            <option value=\"Beginner\">Beginner — new to this<\u002Foption>\n            <option value=\"Intermediate\">Intermediate — some experience<\u002Foption>\n            <option value=\"Advanced\">Advanced — looking to go deeper<\u002Foption>\n          <\u002Fselect>\n          <sc-if value=\"{{ errors.skill_level }}\" hint-placeholder-val=\"{{ false }}\"><span class=\"field-error\">{{ errors.skill_level }}<\u002Fspan><\u002Fsc-if>\n        <\u002Flabel>\n        <label style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <span style=\"font-size: 14px; font-weight: 600;\">Preferred format<\u002Fspan>\n          <select name=\"format\" class=\"{{ formatErrClass }}\" style=\"padding: 13px 14px; border-radius: 3px; border: 1px solid oklch(80% 0.012 85); background: oklch(99% 0.004 85); font-size: 15px; font-family: inherit;\">\n            <option value=\"\">Choose one<\u002Foption>\n            <option value=\"Written lesson\">Written lesson<\u002Foption>\n            <option value=\"Video\">Video<\u002Foption>\n            <option value=\"Template or tool\">Template or tool<\u002Foption>\n            <option value=\"Dataset to practice with\">Dataset to practice with<\u002Foption>\n          <\u002Fselect>\n          <sc-if value=\"{{ errors.format }}\" hint-placeholder-val=\"{{ false }}\"><span class=\"field-error\">{{ errors.format }}<\u002Fspan><\u002Fsc-if>\n        <\u002Flabel>\n        <label style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <span style=\"font-size: 14px; font-weight: 600;\">Your email (optional, if you'd like to be notified)<\u002Fspan>\n          <input type=\"email\" name=\"email\" class=\"{{ emailErrClass }}\" placeholder=\"you@email.com\" style=\"padding: 13px 14px; border-radius: 3px; border: 1px solid oklch(80% 0.012 85); background: oklch(99% 0.004 85); font-size: 15px; font-family: inherit;\">\n          <sc-if value=\"{{ errors.email }}\" hint-placeholder-val=\"{{ false }}\"><span class=\"field-error\">{{ errors.email }}<\u002Fspan><\u002Fsc-if>\n        <\u002Flabel>\n        <button type=\"submit\" style=\"background: oklch(50% 0.1 195); color: oklch(98% 0.006 85); border: none; padding: 14px 24px; border-radius: 3px; font-size: 15px; font-weight: 600; cursor: pointer; align-self: flex-start;\" style-hover=\"background: oklch(42% 0.1 195);\">Submit request<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background: oklch(96% 0.01 85); border: 1px solid oklch(89% 0.012 85); border-radius: 6px; padding: 32px;\">\n        <h3 style=\"font-size: 19px; font-weight: 600; margin: 0 0 8px;\">Thanks — request received.<\u002Fh3>\n        <p style=\"font-size: 15px; line-height: 1.6; color: oklch(40% 0.02 260); margin: 0;\">We review every request and use them to decide what to teach next.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <footer style=\"padding: 32px var(--sec-pad-x); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; font-size: 13px; color: oklch(50% 0.02 260); border-top: 1px solid oklch(90% 0.01 85); background: oklch(96% 0.01 85);\">\n    <span>© 2026 UpSkill Sprint Consulting<\u002Fspan>\n    <span>Education is free.<\u002Fspan>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { submitted: false, errors: {} };\n\n  validate(payload) {\n    const errors = {};\n    if (!payload.topic || !payload.topic.trim()) errors.topic = 'Please tell us what you want to learn.';\n    if (!payload.problem || !payload.problem.trim()) errors.problem = 'Please describe the problem you\\u2019re solving.';\n    if (!payload.skill_level) errors.skill_level = 'Please choose your skill level.';\n    if (!payload.format) errors.format = 'Please choose a preferred format.';\n    if (payload.email && payload.email.trim() && !/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(payload.email.trim())) {\n      errors.email = 'That email address doesn\\u2019t look right.';\n    }\n    return errors;\n  }\n\n  handleSubmit(e) {\n    e.preventDefault();\n    const form = e.target;\n    const data = new FormData(form);\n    const payload = {};\n    data.forEach((v, k) => { payload[k] = v; });\n    const errors = this.validate(payload);\n    if (Object.keys(errors).length > 0) { this.setState({ errors }); return; }\n    this.setState({ errors: {} });\n    const encode = (obj) => Object.keys(obj).map(k => encodeURIComponent(k) + '=' + encodeURIComponent(obj[k])).join('&');\n    fetch('/', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: encode(payload) })\n      .finally(() => { this.setState({ submitted: true }); });\n  }\n\n  renderVals() {\n    const errors = this.state.errors || {};\n    return {\n      submitted: this.state.submitted,\n      handleSubmit: (e) => this.handleSubmit(e),\n      errors: errors,\n      topicErrClass: errors.topic ? 'field-invalid' : '',\n      problemErrClass: errors.problem ? 'field-invalid' : '',\n      skillErrClass: errors.skill_level ? 'field-invalid' : '',\n      formatErrClass: errors.format ? 'field-invalid' : '',\n      emailErrClass: errors.email ? 'field-invalid' : '',\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
