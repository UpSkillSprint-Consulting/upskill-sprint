<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calculator User Manual | UpSkill Sprint</title>
<meta name="description" content="User manual for the UpSkill Sprint Engineering &amp; Statistics Calculator.">
<link rel="canonical" href="https://upskillsprint.com/tools/calculator-manual.html">
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f5f8fc;color:#172033;font:15px/1.55 Inter,Segoe UI,Arial,sans-serif}
  .loader{width:min(560px,calc(100% - 40px));padding:32px;border:1px solid #dce4ee;border-radius:16px;background:#fff;box-shadow:0 12px 35px rgba(11,31,58,.09);text-align:center}
  .loader h1{font-size:24px;margin:0 0 10px}.loader p{color:#5e6b7f;margin:0}.loader a{color:#1769aa}
  html[data-theme="dark"] body{background:#0a1118;color:#e8eef4}html[data-theme="dark"] .loader{background:#101b26;border-color:#21384c}html[data-theme="dark"] .loader p{color:#a9b6c8}
</style>
<script src="/theme.js"></script>
<script src="/tools/calculator-assets/manual-payload-01a.js"></script>
<script src="/tools/calculator-assets/manual-payload-01b.js"></script>
<script src="/tools/calculator-assets/manual-payload-01c.js"></script>
<script src="/tools/calculator-assets/manual-payload-02a.js"></script>
<script src="/tools/calculator-assets/manual-payload-02b.js"></script>
  <script src="/site-sections.js"></script>
</head>
<body>
<main class="loader" id="loader">
  <h1>Loading Calculator User Manual</h1>
  <p>Please wait while the manual opens.</p>
</main>
<script>
(async function(){
  try{
    if(!('DecompressionStream' in window)) throw new Error('This browser does not support the required decompression feature.');
    const payload=window.__upskillManualPayload||'';
    const bytes=Uint8Array.from(atob(payload),c=>c.charCodeAt(0));
    const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    const html=await new Response(stream).text();
    document.open();document.write(html.replace('</body>', '<script src="/contrast-fix.js"><\/script></body>'));document.close();
  }catch(error){
    document.getElementById('loader').innerHTML='<h1>Unable to open the manual</h1><p>'+String(error.message||error)+'<br><br><a href="/tools/engineering-statistics-calculator.html">Return to Calculator</a></p>';
  }
}());
</script>
<script src="/contrast-fix.js"></script>
</body>
</html>
