# Netlify deployment configuration for UpSkill Sprint.
# Pretty URLs serve HTML pages without exposing the .html extension.

[build]
  command = "node scripts/build-grade-specification-lookup.mjs"
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true
