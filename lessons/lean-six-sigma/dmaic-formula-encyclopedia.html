<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DMAIC Formula Encyclopedia | UpSkill Sprint Consulting</title>
  <meta name="description" content="An interactive ASQ DMAIC formula encyclopedia covering CSSBB, CQE and Certified Master Black Belt formula families across Pre-DMAIC, Define, Measure, Analyze, Improve and Control.">
  <link rel="canonical" href="https://upskillsprint.com/lessons/lean-six-sigma/dmaic-formula-encyclopedia">
  <meta property="og:type" content="article">
  <meta property="og:title" content="DMAIC Formula Encyclopedia | UpSkill Sprint Consulting">
  <meta property="og:description" content="Search and study validated Lean Six Sigma, quality engineering and Master Black Belt formula families organized by DMAIC phase.">
  <meta property="og:image" content="https://upskillsprint.com/assets/logo-icon.png">
  <meta property="og:url" content="https://upskillsprint.com/lessons/lean-six-sigma/dmaic-formula-encyclopedia">
  <meta name="twitter:card" content="summary">
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      background: #f4f7fb;
      color: #182230;
      font: 16px/1.6 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .loader-card {
      width: min(560px, 100%);
      padding: 30px;
      border: 1px solid #d8e0ea;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 12px 30px rgba(15, 23, 42, .08);
      text-align: center;
    }
    .loader-card h1 { margin: 0 0 8px; font-size: 1.45rem; }
    .loader-card p { margin: 0; color: #5f6b7a; }
    .spinner {
      width: 34px;
      height: 34px;
      margin: 0 auto 18px;
      border: 4px solid #d8e0ea;
      border-top-color: #075985;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-color-scheme: dark) {
      body { background: #07111f; color: #e5edf7; }
      .loader-card { border-color: #2c3d55; background: #101c2e; box-shadow: 0 12px 30px rgba(0,0,0,.28); }
      .loader-card p { color: #a8b5c7; }
      .spinner { border-color: #2c3d55; border-top-color: #38bdf8; }
    }
  </style>
  <script src="/theme.js"></script>
  <script src="/site-sections.js"></script>
</head>
<body>
  <main class="loader-card" id="loader-card" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <h1>Loading the DMAIC Formula Encyclopedia</h1>
    <p>Preparing the searchable equations and interactive study tools.</p>
  </main>
  <noscript>This interactive lesson requires JavaScript. Enable JavaScript and reload the page.</noscript>

  <script>
  (async function loadLesson() {
    const assetRoot = '/assets/lessons/dmaic-formula-encyclopedia/';
    const partNames = ['part-1.txt', 'part-2.txt', 'part-3.txt', 'part-4.txt'];

    function decodeBase64(value) {
      const binary = atob(value.replace(/\s+/g, ''));
      return Uint8Array.from(binary, function (character) {
        return character.charCodeAt(0);
      });
    }

    async function gunzip(bytes) {
      if ('DecompressionStream' in window) {
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
        return new Response(stream).text();
      }

      const fflate = await import('https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js');
      return fflate.strFromU8(fflate.gunzipSync(bytes));
    }

    function siteHeaderMarkup() {
      return `
        <header class="site upskill-lesson-sitebar">
          <div class="upskill-sitebar-inner">
            <a class="upskill-sitebar-brand" href="/" aria-label="UpSkill Sprint Consulting home">
              <img src="/assets/logo-icon.png" alt="UpSkill Sprint Consulting logo" width="36" height="36">
              <span>UpSkill Sprint Consulting</span>
            </a>
            <div class="header-actions upskill-sitebar-actions">
              <a class="upskill-sitebar-link" href="/">Back to Home</a>
              <a class="upskill-sitebar-link" href="/lessons#lean-six-sigma">Back to Lean Six Sigma</a>
            </div>
          </div>
        </header>`;
    }

    function siteHeaderStyles() {
      return `
        <style id="upskill-lesson-site-header">
          .upskill-lesson-sitebar {
            position: sticky !important;
            top: 0 !important;
            z-index: 5000 !important;
            display: flex !important;
            align-items: center !important;
            width: 100% !important;
            min-height: 72px !important;
            margin: 0 !important;
            padding: 0 clamp(18px, 4vw, 40px) !important;
            border: 0 !important;
            border-bottom: 1px solid rgba(148, 163, 184, .24) !important;
            background: rgba(7, 17, 31, .97) !important;
            box-shadow: 0 8px 24px rgba(2, 8, 23, .14) !important;
            backdrop-filter: blur(14px);
          }
          .upskill-sitebar-inner {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            gap: 24px !important;
            width: min(100%, 1320px) !important;
            min-height: 72px !important;
            margin: 0 auto !important;
          }
          .upskill-sitebar-brand {
            display: inline-flex !important;
            align-items: center !important;
            gap: 11px !important;
            flex: 0 1 auto !important;
            color: #f8fafc !important;
            font: 700 15px/1.2 "Work Sans", Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
            text-decoration: none !important;
            white-space: nowrap !important;
          }
          .upskill-sitebar-brand:hover,
          .upskill-sitebar-brand:focus,
          .upskill-sitebar-brand:visited {
            color: #f8fafc !important;
            text-decoration: none !important;
          }
          .upskill-sitebar-brand img {
            display: block !important;
            width: 36px !important;
            height: 36px !important;
            flex: 0 0 36px !important;
            object-fit: contain !important;
          }
          .upskill-sitebar-actions {
            display: flex !important;
            align-items: center !important;
            justify-content: flex-end !important;
            gap: 9px !important;
            margin: 0 !important;
          }
          .upskill-sitebar-link {
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            min-height: 40px !important;
            padding: 9px 13px !important;
            border: 1px solid rgba(148, 163, 184, .34) !important;
            border-radius: 8px !important;
            background: rgba(255, 255, 255, .04) !important;
            color: #e8eef6 !important;
            font: 650 13px/1.2 "Work Sans", Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
            text-decoration: none !important;
            white-space: nowrap !important;
            transition: background-color .18s ease, border-color .18s ease, color .18s ease !important;
          }
          .upskill-sitebar-link:hover,
          .upskill-sitebar-link:focus {
            border-color: rgba(45, 212, 191, .72) !important;
            background: rgba(45, 212, 191, .12) !important;
            color: #ffffff !important;
            text-decoration: none !important;
            outline: none !important;
          }
          .upskill-lesson-sitebar .theme-control {
            margin-right: 3px !important;
          }
          @media (max-width: 760px) {
            .upskill-lesson-sitebar {
              min-height: 64px !important;
              padding: 0 14px !important;
            }
            .upskill-sitebar-inner {
              min-height: 64px !important;
              gap: 12px !important;
            }
            .upskill-sitebar-brand span {
              display: none !important;
            }
            .upskill-sitebar-actions {
              gap: 6px !important;
            }
            .upskill-sitebar-link {
              min-height: 38px !important;
              padding: 8px 10px !important;
              font-size: 12px !important;
            }
          }
          @media (max-width: 480px) {
            .upskill-sitebar-link:first-of-type {
              display: none !important;
            }
            .upskill-sitebar-link {
              white-space: normal !important;
              text-align: center !important;
            }
          }
          @media print {
            .upskill-lesson-sitebar { display: none !important; }
          }
        </style>`;
    }

    try {
      const responses = await Promise.all(partNames.map(async function (partName) {
        const response = await fetch(assetRoot + partName, { cache: 'force-cache' });
        if (!response.ok) {
          throw new Error('Unable to load ' + partName + ' (' + response.status + ')');
        }
        return response.text();
      }));

      let lessonHTML = await gunzip(decodeBase64(responses.join('')));

      lessonHTML = lessonHTML
        .replace(
          '<title>ASQ DMAIC Formula Encyclopedia — CSSBB, CQE and CMBB</title>',
          '<title>DMAIC Formula Encyclopedia | UpSkill Sprint Consulting</title>'
        )
        .replace(
          '</head>',
          siteHeaderStyles() +
          '<script src="/theme.js"><\\/script>' +
          '<script src="/arrow-cleanup.js"><\\/script>' +
          '<script src="/contrast-fix.js"><\\/script>' +
          '</head>'
        )
        .replace(
          '<body>',
          '<body>' + siteHeaderMarkup()
        );

      document.open();
      document.write(lessonHTML);
      document.close();
    } catch (error) {
      console.error(error);
      const card = document.getElementById('loader-card');
      card.innerHTML = '<h1>The lesson could not be loaded</h1><p>Please refresh the page. If the issue continues, return to the <a href="/lessons#lean-six-sigma">Lean Six Sigma lesson library</a>.</p>';
    }
  }());
  </script>
<script src="/contrast-fix.js"></script>
</body>
</html>
