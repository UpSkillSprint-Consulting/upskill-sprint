name: Restore full normal lesson and update header

on:
  push:
    branches:
      - agent/add-normal-distribution-lesson
    paths:
      - .github/workflows/restore-full-normal-lesson-header.yml

permissions:
  contents: write

jobs:
  restore-and-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/add-normal-distribution-lesson
          fetch-depth: 0

      - name: Restore verified lesson and patch navigation
        shell: bash
        run: |
          set -euo pipefail
          lesson="lessons/statistics/the-normal-distribution-meet-the-bell-curve.html"
          git checkout 1141dcf714eb5c198cbfbe22003387f6bb0af1eb -- "$lesson"

          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("lessons/statistics/the-normal-distribution-meet-the-bell-curve.html")
          text = path.read_text(encoding="utf-8")

          css_pattern = re.compile(
              r"/\* ============ SITE INTEGRATION: Header ============ \*/.*?"
              r"/\* ============ Layout ============ \*/",
              re.S,
          )
          css_replacement = """/* ============ SITE INTEGRATION: Header ============ */
          header.site.lesson-sitebar { z-index: 50; }
          .lesson-sitebar .header-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
          }
          .lesson-sitebar .theme-control { flex-shrink: 0; }

          /* ============ Layout ============ */"""
          text, css_count = css_pattern.subn(css_replacement, text, count=1)
          if css_count != 1:
              raise SystemExit(f"Header CSS block replacement failed: {css_count}")

          header_pattern = re.compile(
              r"<!-- SITE INTEGRATION: Header -->.*?<main id=\"lesson-content\">",
              re.S,
          )
          header_replacement = """<!-- SITE INTEGRATION: Header -->
          <input type="checkbox" id="mnav-check" class="mnav-check" aria-hidden="true">
          <header class="site lesson-sitebar">
            <a class="brand" href="/">
              <img src="/assets/logo-icon.png" alt="UpSkill Sprint Consulting logo">
              <span>UpSkill Sprint Consulting</span>
            </a>
            <nav class="desktop-nav" aria-label="Primary navigation">
              <a href="/start-here">Start Here</a>
              <a href="/lessons" aria-current="page">Lessons</a>
              <a href="/engineering-tools">Engineering Tools</a>
              <a href="/services">Services</a>
              <a href="/request-topic">Request a Topic</a>
              <a href="/about">About</a>
              <a href="/faq">FAQ</a>
              <a href="/contact">Contact</a>
            </nav>
            <div class="header-actions">
              <label for="mnav-check" class="mobile-menu-btn" aria-label="Open menu">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
              </label>
              <div class="theme-control" aria-label="Colour theme">
                <svg class="theme-icon theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
                <button type="button" class="theme-toggle" data-theme-toggle="true" role="switch" aria-checked="false" aria-label="Switch to dark mode" title="Switch to dark mode"><span class="sr-only">Toggle dark and light mode</span></button>
                <svg class="theme-icon theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
              </div>
            </div>
          </header>
          <nav class="mobile-nav" aria-label="Mobile navigation">
            <a href="/start-here">Start Here</a>
            <a href="/lessons" aria-current="page">Lessons</a>
            <a href="/engineering-tools">Engineering Tools</a>
            <a href="/services">Services</a>
            <a href="/request-topic">Request a Topic</a>
            <a href="/about">About</a>
            <a href="/faq">FAQ</a>
            <a href="/contact">Contact</a>
          </nav>

          <main id="lesson-content">"""
          text, header_count = header_pattern.subn(header_replacement, text, count=1)
          if header_count != 1:
              raise SystemExit(f"Header markup replacement failed: {header_count}")

          checks = {
              "legacy top label removed": '<span class="header-note">Statistics lesson</span>' not in text,
              "desktop navigation present": '<nav class="desktop-nav"' in text,
              "mobile navigation present": '<nav class="mobile-nav"' in text,
              "engineering tools included twice": text.count('>Engineering Tools</a>') == 2,
              "theme toggle retained": 'data-theme-toggle="true"' in text,
              "dark quiz contrast retained": 'html[data-theme="dark"] .quiz-option' in text,
              "full lesson ending retained": text.rstrip().endswith('</html>'),
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit("Validation failed: " + ", ".join(failed))

          path.write_text(text, encoding="utf-8")
          print(f"Updated {path} ({len(text.encode('utf-8')):,} bytes)")
          PY

          rm -f .github/workflows/restore-full-normal-lesson-header.yml

      - name: Commit restored lesson and navigation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore full lesson and use site navigation"
          git push origin HEAD:agent/add-normal-distribution-lesson
