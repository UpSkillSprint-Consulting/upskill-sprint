name: Convert Pareto summary to bullets

on:
  push:
    branches:
      - test

permissions:
  contents: write

jobs:
  update-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: test
          fetch-depth: 0

      - name: Replace summary cards with bullet list
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          lesson_path = Path('lessons/understanding-pareto-chart.html')
          progress_path = Path('progress.js')
          workflow_path = Path('.github/workflows/pareto-summary-bullets.yml')

          lesson = lesson_path.read_text(encoding='utf-8')

          summary_html = '''      <section id="summary">
        <h2>Summary</h2>
        <ul class="summary-list">
          <li><strong>Sort first:</strong> Descending order is essential; otherwise the chart does not show priority clearly.</li>
          <li><strong>Use one measure:</strong> Every bar must represent the same unit—count, dollars, time, weight, or another consistent value.</li>
          <li><strong>Read the cumulative line:</strong> It shows how quickly the leading categories explain the total.</li>
          <li><strong>Challenge the ranking:</strong> Compare frequency with cost, severity, exposure, and stratified views when the decision warrants it.</li>
          <li><strong>Investigate next:</strong> A Pareto chart prioritizes the problem; it does not prove the underlying root cause.</li>
        </ul>
      </section>'''

          lesson, count = re.subn(
              r'      <section id="summary">.*?      </section>',
              summary_html,
              lesson,
              count=1,
              flags=re.S
          )
          if count != 1:
              raise SystemExit(f'Expected one summary section replacement, found {count}')

          summary_css = '''    .summary-list {
      max-width: 76ch;
      margin: 0;
      padding-left: 1.35rem;
    }
    .summary-list li {
      margin: 0.72rem 0;
      padding-left: 0.3rem;
      color: var(--ink);
    }
    .summary-list li::marker {
      color: var(--teal);
      font-size: 1.05em;
    }
    .summary-list strong {
      color: var(--teal-dark);
    }

    .references-list'''

          lesson, count = re.subn(
              r'    \.summary-grid \{.*?\n    \.references-list',
              summary_css,
              lesson,
              count=1,
              flags=re.S
          )
          if count != 1:
              raise SystemExit(f'Expected one summary CSS replacement, found {count}')

          lesson = lesson.replace(
              '.insight-card, .quiz-shell, .quiz-q, .summary-item, .practice-step {',
              '.insight-card, .quiz-shell, .quiz-q, .summary-list li, .practice-step {'
          )
          lesson_path.write_text(lesson, encoding='utf-8')

          progress = progress_path.read_text(encoding='utf-8')
          replacement = '''      '.lesson-wrapper #summary { max-width: 920px; margin: 3rem auto 1.8rem; }',
      '.lesson-wrapper .summary-list { max-width: 76ch; margin: 0; padding-left: 1.35rem; }',
      '.lesson-wrapper .summary-list li { margin: .72rem 0; padding-left: .3rem; color: var(--ink); }',
      '.lesson-wrapper .summary-list li::marker { color: var(--teal); font-size: 1.05em; }',
      '.lesson-wrapper .summary-list strong { color: var(--teal-dark); }',
      '.lesson-wrapper #references'''

          progress, count = re.subn(
              r"      '\.lesson-wrapper #summary .*?      '\.lesson-wrapper #references",
              replacement,
              progress,
              count=1,
              flags=re.S
          )
          if count != 1:
              raise SystemExit(f'Expected one path-scoped summary-style replacement, found {count}')

          progress = progress.replace(
              "      '  .lesson-wrapper .summary-item { grid-template-columns: 1fr; gap: .25rem; }',\n",
              ''
          )
          progress_path.write_text(progress, encoding='utf-8')

          final_lesson = lesson_path.read_text(encoding='utf-8')
          assert '<ul class="summary-list">' in final_lesson
          assert 'class="summary-item"' not in final_lesson
          assert 'class="summary-grid"' not in final_lesson
          assert '.summary-list li::marker' in final_lesson

          workflow_path.unlink()
          PY

      - name: Commit bullet-summary layout
        shell: bash
        run: |
          git config user.name "upskillsprint-agent"
          git config user.email "upskillsprint-agent@users.noreply.github.com"
          git add lessons/understanding-pareto-chart.html progress.js .github/workflows/pareto-summary-bullets.yml
          git commit -m "Convert Pareto lesson summary to bullet points"
          git push origin HEAD:test
