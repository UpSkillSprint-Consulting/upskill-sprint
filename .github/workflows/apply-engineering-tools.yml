name: Apply Engineering Tools site section

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - engineering-tools.html
      - .github/workflows/apply-engineering-tools.yml

permissions:
  contents: write

jobs:
  update-site-navigation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Engineering Tools to navigation and homepage
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          repo = Path('.')
          changed = []

          def engineering_link(path: Path) -> str:
              current = path.name == 'engineering-tools.html' and path.parent == repo
              current_attr = ' aria-current="page"' if current else ''
              return f'<a href="/engineering-tools.html"{current_attr}>Engineering Tools</a>'

          def update_nav(text: str, path: Path, class_name: str) -> str:
              pattern = re.compile(
                  rf'(<nav\b[^>]*class=["\'][^"\']*\b{re.escape(class_name)}\b[^"\']*["\'][^>]*>)(.*?)(</nav>)',
                  re.IGNORECASE | re.DOTALL,
              )

              def replace(match):
                  opening, body, closing = match.groups()
                  link = engineering_link(path)
                  if 'engineering-tools.html' in body:
                      if path.name == 'engineering-tools.html' and path.parent == repo:
                          body = re.sub(
                              r'<a\b([^>]*href=["\'][^"\']*engineering-tools\.html[^"\']*["\'][^>]*)>\s*Engineering Tools\s*</a>',
                              lambda m: '<a' + re.sub(r'\saria-current=["\']page["\']', '', m.group(1)) + ' aria-current="page">Engineering Tools</a>',
                              body,
                              count=1,
                              flags=re.IGNORECASE,
                          )
                      return opening + body + closing

                  lesson = re.compile(
                      r'(<a\b[^>]*href=["\'][^"\']*lessons\.html[^"\']*["\'][^>]*>\s*Lessons\s*</a>)',
                      re.IGNORECASE,
                  )
                  body, count = lesson.subn(r'\1\n      ' + link, body, count=1)
                  if count == 0:
                      body = body + '\n      ' + link
                  return opening + body + closing

              return pattern.sub(replace, text, count=1)

          def update_footer_quick_links(text: str, path: Path) -> str:
              pattern = re.compile(
                  r'(<h4>\s*Quick Links\s*</h4>)(.*?)(</div>)',
                  re.IGNORECASE | re.DOTALL,
              )

              def replace(match):
                  heading, body, closing = match.groups()
                  if 'engineering-tools.html' in body:
                      return match.group(0)
                  lesson = re.compile(
                      r'(<a\b[^>]*href=["\'][^"\']*lessons\.html[^"\']*["\'][^>]*>\s*Lessons\s*</a>)',
                      re.IGNORECASE,
                  )
                  body, count = lesson.subn(r'\1\n          ' + engineering_link(path), body, count=1)
                  if count == 0:
                      body = body + '\n          ' + engineering_link(path)
                  return heading + body + closing

              return pattern.sub(replace, text, count=1)

          for path in sorted(repo.rglob('*.html')):
              if '.git' in path.parts:
                  continue

              text = path.read_text(encoding='utf-8')
              original = text
              text = update_nav(text, path, 'desktop-nav')
              text = update_nav(text, path, 'mobile-nav')
              text = update_footer_quick_links(text, path)

              if path == repo / 'index.html':
                  if '<!-- engineering-tools-path -->' not in text:
                      anchor = '''        <a href="services.html" class="card" style="color:var(--ink);">
          <h3 style="font-size:17px;margin:0 0 8px;">I need consulting support</h3>
          <p style="font-size:14.5px;color:var(--muted);margin:0;">Get help with quality, data, process, or performance improvement projects.</p>
        </a>'''
                      addition = anchor + '''
        <!-- engineering-tools-path -->
        <a href="engineering-tools.html" class="card" style="color:var(--ink);grid-column:1/-1;">
          <h3 style="font-size:17px;margin:0 0 8px;">I need an engineering tool</h3>
          <p style="font-size:14.5px;color:var(--muted);margin:0;">Explore material checkers, engineering calculators, and unit converters.</p>
        </a>'''
                      text = text.replace(anchor, addition, 1)

                  if '<!-- engineering-tools-topic-chip -->' not in text:
                      chip_anchor = '<a href="lessons.html#ai-for-work" class="chip">AI for Work</a>'
                      chip = chip_anchor + '\n        <!-- engineering-tools-topic-chip -->\n        <a href="engineering-tools.html" class="chip">Engineering Tools</a>'
                      text = text.replace(chip_anchor, chip, 1)

                  if '<!-- engineering-tools-home-section -->' not in text:
                      tools_section = '''
  <!-- engineering-tools-home-section -->
  <section class="section">
    <div class="wrap">
      <p class="eyebrow">Engineering tools</p>
      <h2 style="font-size:28px;margin:0 0 12px;max-width:700px;">Calculators, converters, and technical checkers.</h2>
      <p style="font-size:15.5px;line-height:1.7;color:var(--muted);margin:0 0 32px;max-width:760px;">A growing tools area for materials, quality, engineering calculations, statistics, and unit conversion.</p>
      <div class="grid-3">
        <a href="engineering-tools.html#materials-quality" class="card" style="color:var(--ink);">
          <div style="width:36px;height:36px;border-radius:8px;background:var(--teal);margin-bottom:18px;"></div>
          <p style="font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:0 0 10px;">In development</p>
          <h3 style="font-size:17px;margin:0 0 10px;">Material Specification Compliance Checker</h3>
          <p style="font-size:14px;color:var(--muted);margin:0 0 16px;">Compare chemistry and mechanical test results against selected CSA or ASTM requirements.</p>
          <span style="font-size:13.5px;font-weight:600;">View tool roadmap &rarr;</span>
        </a>
        <a href="engineering-tools.html#engineering-calculators" class="card" style="color:var(--ink);">
          <div style="width:36px;height:36px;border-radius:8px;background:var(--navy);margin-bottom:18px;"></div>
          <p style="font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:0 0 10px;">Planned</p>
          <h3 style="font-size:17px;margin:0 0 10px;">Engineering Calculator</h3>
          <p style="font-size:14px;color:var(--muted);margin:0 0 16px;">Quick calculations for geometry, mass, pressure, flow, and process work.</p>
          <span style="font-size:13.5px;font-weight:600;">Explore calculators &rarr;</span>
        </a>
        <a href="engineering-tools.html#converters" class="card" style="color:var(--ink);">
          <div style="width:36px;height:36px;border-radius:8px;background:var(--teal);margin-bottom:18px;"></div>
          <p style="font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:0 0 10px;">Planned</p>
          <h3 style="font-size:17px;margin:0 0 10px;">Unit Converter</h3>
          <p style="font-size:14px;color:var(--muted);margin:0 0 16px;">Convert SI, Imperial, and common industry units used in technical work.</p>
          <span style="font-size:13.5px;font-weight:600;">Explore converters &rarr;</span>
        </a>
      </div>
      <div style="margin-top:26px;">
        <a href="engineering-tools.html" class="btn btn-outline">Browse all Engineering Tools</a>
      </div>
    </div>
  </section>

'''
                      services_pattern = re.compile(
                          r'(  <section class="section">\s*<div class="wrap">\s*<p class="eyebrow">Services</p>)',
                          re.DOTALL,
                      )
                      text, count = services_pattern.subn(tools_section + r'\1', text, count=1)
                      if count == 0:
                          print('Warning: homepage Services section anchor was not found')

                  topics_anchor = '<a href="lessons.html#quality-engineering">Quality Engineering</a>'
                  if 'engineering-tools.html">Engineering Tools</a>' not in text[text.find('<h4>Topics</h4>'):]:
                      text = text.replace(topics_anchor, topics_anchor + '\n          <a href="engineering-tools.html">Engineering Tools</a>', 1)

              if path == repo / 'lessons.html' and '<!-- engineering-tools-library-link -->' not in text:
                  chip_anchor = '<a href="#ai-for-work" class="chip">AI for Work</a>'
                  chip = chip_anchor + '\n        <!-- engineering-tools-library-link -->\n        <a href="engineering-tools.html" class="chip">Engineering Tools</a>'
                  text = text.replace(chip_anchor, chip, 1)

              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          print(f'Updated {len(changed)} HTML files')
          for item in changed:
              print(f'  - {item}')
          PY

      - name: Commit site updates
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Engineering Tools is already present across the site."
            exit 0
          fi

          git config user.name "UpSkill Sprint Site Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -- '*.html'
          git commit -m "Add Engineering Tools across website"
          git push
