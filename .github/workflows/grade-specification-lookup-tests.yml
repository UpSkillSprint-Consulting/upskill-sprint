name: Grade Specification Lookup validation

on:
  pull_request:
    paths:
      - 'engineering-tools.html'
      - 'scripts/build-grade-specification-lookup.mjs'
      - 'source-assets/grade-specification-lookup/**'
      - 'sitemap.xml'
      - 'netlify.toml'
      - '.github/workflows/grade-specification-lookup-tests.yml'
  push:
    branches: [main, test]
    paths:
      - 'engineering-tools.html'
      - 'scripts/build-grade-specification-lookup.mjs'
      - 'source-assets/grade-specification-lookup/**'
      - 'sitemap.xml'
      - 'netlify.toml'
      - '.github/workflows/grade-specification-lookup-tests.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build verified source files
        id: build
        continue-on-error: true
        run: |
          set +e
          node scripts/build-grade-specification-lookup.mjs > grade-build.log 2>&1
          code=$?
          node -e "const fs=require('fs'); for (const p of ['source-assets/grade-specification-lookup/grade_spec_lookup.html.br.b64.part-01','source-assets/grade-specification-lookup/grade_spec_lookup_user_guide.html.gz.b64']) { const s=fs.statSync(p); fs.appendFileSync('grade-build.log', '\n'+p+' bytes='+s.size+'\n'); }"
          exit $code
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grade-specification-lookup-build-log
          path: grade-build.log
          retention-days: 3
      - name: Stop after build failure
        if: steps.build.outcome == 'failure'
        run: |
          cat grade-build.log
          exit 1
      - name: Validate generated routes and integration
        run: |
          node <<'NODE'
          const { readFileSync, existsSync } = require('node:fs');
          const appPath = 'engineering-tools/grade-specification-lookup/index.html';
          const guidePath = 'engineering-tools/grade-specification-lookup/how-to-use/index.html';
          if (!existsSync(appPath) || !existsSync(guidePath)) throw new Error('Generated application or guide is missing.');
          const app = readFileSync(appPath, 'utf8');
          const guide = readFileSync(guidePath, 'utf8');
          const directory = readFileSync('engineering-tools.html', 'utf8');
          const sitemap = readFileSync('sitemap.xml', 'utf8');
          const requiredNav = ['Start Here','Lessons','Engineering Tools','Services','Request a Topic','About','FAQ','Contact'];
          for (const label of requiredNav) {
            if (!app.includes(label) || !guide.includes(label)) throw new Error(`Missing navigation label: ${label}`);
          }
          const checks = [
            [app.includes('https://upskillsprint.com/engineering-tools/grade-specification-lookup'), 'Application canonical URL missing'],
            [guide.includes('https://upskillsprint.com/engineering-tools/grade-specification-lookup/how-to-use'), 'Guide canonical URL missing'],
            [app.includes('/assets/logo-icon.png') && guide.includes('/assets/logo-icon.png'), 'UpSkill Sprint logo missing'],
            [app.includes('Back to Engineering Tools') && guide.includes('Back to Engineering Tools'), 'Category return link missing'],
            [app.includes('/tools/material-specification-compliance-checker'), 'Companion compliance-checker link missing'],
            [!app.includes('grade_spec_lookup_user_guide.html'), 'Legacy guide link remains'],
            [directory.includes('Material Specification Tools'), 'Material Specification Tools group missing'],
            [directory.includes('/engineering-tools/grade-specification-lookup'), 'Engineering Tools directory entry missing'],
            [sitemap.includes('/engineering-tools/grade-specification-lookup</loc>'), 'Application sitemap URL missing'],
            [sitemap.includes('/engineering-tools/grade-specification-lookup/how-to-use</loc>'), 'Guide sitemap URL missing']
          ];
          for (const [condition, message] of checks) if (!condition) throw new Error(message);
          console.log('Grade Specification Lookup integration checks passed.');
          NODE

  pareto-polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: test
          fetch-depth: 0
      - name: Apply focused visual cleanup
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('lessons/understanding-pareto-chart.html')
          text = path.read_text(encoding='utf-8')
          marker = '    @media print {'
          tag = '    /* Bottom-of-lesson visual cleanup */'
          css = r'''    /* Bottom-of-lesson visual cleanup */
    .lesson-wrapper #summary {
      max-width: 920px;
      margin: 3rem auto 1.8rem;
    }
    .lesson-wrapper #references {
      max-width: 920px;
      margin: 1.8rem auto 0;
    }
    .summary-grid {
      display: block;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .summary-item {
      display: grid;
      grid-template-columns: minmax(9.5rem, 0.42fr) minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
      padding: 0.9rem 0;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
    }
    .summary-item:last-child { border-bottom: 0; }
    .summary-item strong {
      margin: 0;
      color: var(--teal-dark);
      font-family: "Work Sans", Arial, sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.01em;
    }
    .references-list {
      columns: 2;
      column-gap: 2.5rem;
      margin: 0;
      padding-left: 1.35rem;
    }
    .references-list li {
      break-inside: avoid;
      margin: 0 0 0.65rem;
      padding-left: 0.15rem;
    }
    .references-list a {
      text-decoration: none;
      text-underline-offset: 0.18em;
    }
    .references-list a:hover,
    .references-list a:focus-visible { text-decoration: underline; }
    .lesson-wrapper #lesson-progress-widget {
      max-width: 920px;
      margin: 1.75rem auto 0;
      padding: 0;
    }
    .lesson-wrapper #lesson-progress-widget .lp-card {
      display: grid;
      grid-template-columns: minmax(9.5rem, 0.42fr) minmax(0, 1fr) auto;
      gap: 0.35rem 1rem;
      align-items: center;
      padding: 1.15rem 0;
      border: 0;
      border-top: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
    }
    .lesson-wrapper #lesson-progress-widget .lp-label {
      grid-column: 1;
      grid-row: 1 / span 2;
      margin: 0;
    }
    .lesson-wrapper #lesson-progress-widget .lp-card > p:not(.lp-label) {
      grid-column: 2;
      margin: 0;
    }
    .lesson-wrapper #lesson-progress-widget .lp-actions {
      grid-column: 3;
      grid-row: 1 / span 2;
      margin: 0;
    }
    .lesson-footer {
      max-width: 920px;
      margin: 0 auto;
      padding: 1.25rem 0 0;
      border: 0;
      border-top: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
    }
    .lesson-footer-nav {
      grid-template-columns: minmax(0, 0.75fr) minmax(18rem, 1.25fr);
      gap: 2rem;
      align-items: center;
    }
    .back-category-link {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
    }
    .lesson-footer-next {
      max-width: 36rem;
      justify-self: end;
      color: var(--muted);
      line-height: 1.55;
    }
    .lesson-footer-next strong { color: var(--ink); }
    @media (max-width: 700px) {
      .summary-item { grid-template-columns: 1fr; gap: 0.25rem; }
      .references-list { columns: 1; }
      .lesson-wrapper #lesson-progress-widget .lp-card {
        grid-template-columns: 1fr;
        gap: 0.45rem;
        align-items: start;
      }
      .lesson-wrapper #lesson-progress-widget .lp-label,
      .lesson-wrapper #lesson-progress-widget .lp-card > p:not(.lp-label),
      .lesson-wrapper #lesson-progress-widget .lp-actions {
        grid-column: 1;
        grid-row: auto;
      }
      .lesson-wrapper #lesson-progress-widget .lp-actions { margin-top: 0.35rem; }
      .lesson-footer-nav { grid-template-columns: 1fr; gap: 0.75rem; }
      .lesson-footer-next { justify-self: start; text-align: left; }
    }

'''
          if tag not in text:
              if marker not in text:
                  raise SystemExit('Print media marker not found')
              path.write_text(text.replace(marker, css + marker, 1), encoding='utf-8')
          PY
      - name: Restore workflows and commit
        shell: bash
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/grade-specification-lookup-tests.yml
          rm -f .github/workflows/polish-pareto-bottom.yml
          git config user.name "upskillsprint-agent"
          git config user.email "upskillsprint-agent@users.noreply.github.com"
          git add -A
          git commit -m "Polish Pareto lesson ending layout"
          git push origin HEAD:test
