name: Grade Specification Lookup validation

on:
  pull_request:
    paths:
      - 'engineering-tools.html'
      - 'scripts/build-grade-specification-lookup.mjs'
      - 'source-assets/grade-specification-lookup/**'
      - 'sitemap.xml'
      - 'netlify.toml'
      - '.github/workflows/grade-specification-lookup-tests.yml'
  push:
    branches: [main, test]
    paths:
      - 'engineering-tools.html'
      - 'scripts/build-grade-specification-lookup.mjs'
      - 'source-assets/grade-specification-lookup/**'
      - 'sitemap.xml'
      - 'netlify.toml'
      - '.github/workflows/grade-specification-lookup-tests.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build verified source files
        id: build
        continue-on-error: true
        run: |
          set +e
          node scripts/build-grade-specification-lookup.mjs > grade-build.log 2>&1
          code=$?
          node -e "const fs=require('fs'); for (const p of ['source-assets/grade-specification-lookup/grade_spec_lookup.html.br.b64.part-01','source-assets/grade-specification-lookup/grade_spec_lookup_user_guide.html.gz.b64']) { const s=fs.statSync(p); fs.appendFileSync('grade-build.log', '\n'+p+' bytes='+s.size+'\n'); }"
          exit $code
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grade-specification-lookup-build-log
          path: grade-build.log
          retention-days: 3
      - name: Stop after build failure
        if: steps.build.outcome == 'failure'
        run: |
          cat grade-build.log
          exit 1
      - name: Validate generated routes and integration
        run: |
          node <<'NODE'
          const { readFileSync, existsSync } = require('node:fs');
          const appPath = 'engineering-tools/grade-specification-lookup/index.html';
          const guidePath = 'engineering-tools/grade-specification-lookup/how-to-use/index.html';
          if (!existsSync(appPath) || !existsSync(guidePath)) throw new Error('Generated application or guide is missing.');
          const app = readFileSync(appPath, 'utf8');
          const guide = readFileSync(guidePath, 'utf8');
          const directory = readFileSync('engineering-tools.html', 'utf8');
          const sitemap = readFileSync('sitemap.xml', 'utf8');
          const requiredNav = ['Start Here','Lessons','Engineering Tools','Services','Request a Topic','About','FAQ','Contact'];
          for (const label of requiredNav) {
            if (!app.includes(label) || !guide.includes(label)) throw new Error(`Missing navigation label: ${label}`);
          }
          const checks = [
            [app.includes('https://upskillsprint.com/engineering-tools/grade-specification-lookup'), 'Application canonical URL missing'],
            [guide.includes('https://upskillsprint.com/engineering-tools/grade-specification-lookup/how-to-use'), 'Guide canonical URL missing'],
            [app.includes('/assets/logo-icon.png') && guide.includes('/assets/logo-icon.png'), 'UpSkill Sprint logo missing'],
            [app.includes('Back to Engineering Tools') && guide.includes('Back to Engineering Tools'), 'Category return link missing'],
            [app.includes('/tools/material-specification-compliance-checker'), 'Companion compliance-checker link missing'],
            [!app.includes('grade_spec_lookup_user_guide.html'), 'Legacy guide link remains'],
            [directory.includes('Material Specification Tools'), 'Material Specification Tools group missing'],
            [directory.includes('/engineering-tools/grade-specification-lookup'), 'Engineering Tools directory entry missing'],
            [sitemap.includes('/engineering-tools/grade-specification-lookup</loc>'), 'Application sitemap URL missing'],
            [sitemap.includes('/engineering-tools/grade-specification-lookup/how-to-use</loc>'), 'Guide sitemap URL missing']
          ];
          for (const [condition, message] of checks) if (!condition) throw new Error(message);
          console.log('Grade Specification Lookup integration checks passed.');
          NODE

  convert-pareto-summary:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: test
          fetch-depth: 0
      - name: Convert summary cards to bullets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          lesson_path = Path('lessons/understanding-pareto-chart.html')
          progress_path = Path('progress.js')
          transient_path = Path('.github/workflows/pareto-summary-bullets.yml')

          lesson = lesson_path.read_text(encoding='utf-8')
          summary_html = '''      <section id="summary">
            <h2>Summary</h2>
            <ul class="summary-list">
              <li><strong>Sort first:</strong> Descending order is essential; otherwise the chart does not show priority clearly.</li>
              <li><strong>Use one measure:</strong> Every bar must represent the same unit—count, dollars, time, weight, or another consistent value.</li>
              <li><strong>Read the cumulative line:</strong> It shows how quickly the leading categories explain the total.</li>
              <li><strong>Challenge the ranking:</strong> Compare frequency with cost, severity, exposure, and stratified views when the decision warrants it.</li>
              <li><strong>Investigate next:</strong> A Pareto chart prioritizes the problem; it does not prove the underlying root cause.</li>
            </ul>
          </section>'''

          lesson, count = re.subn(
              r'      <section id="summary">.*?      </section>',
              summary_html,
              lesson,
              count=1,
              flags=re.S
          )
          if count != 1:
              raise SystemExit(f'Expected one summary section replacement, found {count}')

          summary_css = '''    .summary-list {
            max-width: 76ch;
            margin: 0;
            padding-left: 1.35rem;
          }
          .summary-list li {
            margin: 0.72rem 0;
            padding-left: 0.3rem;
            color: var(--ink);
          }
          .summary-list li::marker {
            color: var(--teal);
            font-size: 1.05em;
          }
          .summary-list strong { color: var(--teal-dark); }

          .references-list'''

          lesson, count = re.subn(
              r'    \.summary-grid \{.*?\n    \.references-list',
              summary_css,
              lesson,
              count=1,
              flags=re.S
          )
          if count != 1:
              raise SystemExit(f'Expected one summary CSS replacement, found {count}')

          lesson = lesson.replace(
              '.insight-card, .quiz-shell, .quiz-q, .summary-item, .practice-step {',
              '.insight-card, .quiz-shell, .quiz-q, .summary-list li, .practice-step {'
          )
          lesson_path.write_text(lesson, encoding='utf-8')

          progress = progress_path.read_text(encoding='utf-8')
          replacement = '''      '.lesson-wrapper #summary { max-width: 920px; margin: 3rem auto 1.8rem; }',
          '.lesson-wrapper .summary-list { max-width: 76ch; margin: 0; padding-left: 1.35rem; }',
          '.lesson-wrapper .summary-list li { margin: .72rem 0; padding-left: .3rem; color: var(--ink); }',
          '.lesson-wrapper .summary-list li::marker { color: var(--teal); font-size: 1.05em; }',
          '.lesson-wrapper .summary-list strong { color: var(--teal-dark); }',
          '.lesson-wrapper #references'''
          progress, count = re.subn(
              r"      '\.lesson-wrapper #summary .*?      '\.lesson-wrapper #references",
              replacement,
              progress,
              count=1,
              flags=re.S
          )
          if count != 1:
              raise SystemExit(f'Expected one path-scoped summary-style replacement, found {count}')
          progress = progress.replace(
              "      '  .lesson-wrapper .summary-item { grid-template-columns: 1fr; gap: .25rem; }',\n",
              ''
          )
          progress_path.write_text(progress, encoding='utf-8')

          if transient_path.exists():
              transient_path.unlink()

          final_lesson = lesson_path.read_text(encoding='utf-8')
          assert '<ul class="summary-list">' in final_lesson
          assert 'class="summary-item"' not in final_lesson
          assert 'class="summary-grid"' not in final_lesson
          PY
      - name: Restore workflow and commit cleanup
        shell: bash
        run: |
          git checkout origin/main -- .github/workflows/grade-specification-lookup-tests.yml
          git config user.name "upskillsprint-agent"
          git config user.email "upskillsprint-agent@users.noreply.github.com"
          git add lessons/understanding-pareto-chart.html progress.js .github/workflows/grade-specification-lookup-tests.yml
          if [ -e .github/workflows/pareto-summary-bullets.yml ]; then
            git add .github/workflows/pareto-summary-bullets.yml
          else
            git add -u .github/workflows/pareto-summary-bullets.yml || true
          fi
          git commit -m "Convert Pareto lesson summary to bullet points"
          git push origin HEAD:test
