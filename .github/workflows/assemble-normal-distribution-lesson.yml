name: Assemble normal distribution lesson

on:
  push:
    branches:
      - agent/add-normal-distribution-lesson
    paths:
      - .github/workflows/assemble-normal-distribution-lesson.yml

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/add-normal-distribution-lesson
          fetch-depth: 0

      - name: Assemble and verify lesson
        shell: bash
        run: |
          set -euo pipefail
          output="lessons/statistics/the-normal-distribution-meet-the-bell-curve.html"
          mkdir -p "$(dirname "$output")"
          cat .lesson-build/normal-distribution/part-*.txt > "$output"
          echo "2b6cc4839b53227d658e70c50371625777a71eec527fe49592f92151373b4245  $output" | sha256sum --check --strict
          test "$(wc -c < "$output")" -eq 83782
          rm -rf .lesson-build/normal-distribution

      - name: Commit assembled lesson
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add interactive normal distribution lesson"
          git push origin HEAD:agent/add-normal-distribution-lesson
