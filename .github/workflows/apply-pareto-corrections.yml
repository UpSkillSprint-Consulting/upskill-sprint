name: Apply Pareto lesson corrections

on:
  push:
    branches:
      - lesson/pareto-fix
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-corrections:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: lesson/pareto-fix
          fetch-depth: 0

      - name: Apply targeted lesson corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          lesson_path = Path('lessons/understanding-pareto-chart.html')
          library_path = Path('lessons.html')
          lesson = lesson_path.read_text(encoding='utf-8')

          desktop_old = '      <a href="/lessons.html" aria-current="page">Lessons</a>\n      <a href="/services.html">Services</a>'
          desktop_new = '      <a href="/lessons.html" aria-current="page">Lessons</a>\n      <a href="/engineering-tools.html">Engineering Tools</a>\n      <a href="/services.html">Services</a>'
          if desktop_old in lesson:
              lesson = lesson.replace(desktop_old, desktop_new, 1)

          mobile_old = '    <a href="/lessons.html">Lessons</a>\n    <a href="/services.html">Services</a>'
          mobile_new = '    <a href="/lessons.html">Lessons</a>\n    <a href="/engineering-tools.html">Engineering Tools</a>\n    <a href="/services.html">Services</a>'
          if mobile_old in lesson:
              lesson = lesson.replace(mobile_old, mobile_new, 1)

          footer_css_start = lesson.index('    .lesson-footer {')
          footer_css_end = lesson.index('\n    }\n\n    .visually-hidden', footer_css_start) + len('\n    }')
          footer_css = '''    .lesson-footer {
            margin-top: 3.5rem;
            padding: 1.3rem;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: var(--surface-soft);
          }
          .lesson-footer-nav {
            display: grid;
            grid-template-columns: minmax(0, 0.8fr) minmax(0, 1.5fr);
            gap: 1.25rem;
            align-items: end;
          }
          .back-category-link {
            justify-self: start;
            font-weight: 800;
            text-decoration: none;
          }
          .back-category-link:hover { text-decoration: underline; }
          .lesson-footer-next { text-align: right; }
          .lesson-footer-next p { margin: 0.4rem 0 0; }'''.replace('          ', '    ').replace('            ', '      ')
          lesson = lesson[:footer_css_start] + footer_css + lesson[footer_css_end:]

          mobile_marker = '      .stat-grid { grid-template-columns: 1fr 1fr; }'
          mobile_insert = mobile_marker + '\n      .lesson-footer-nav { grid-template-columns: 1fr; align-items: start; }\n      .lesson-footer-next { text-align: left; }'
          if '.lesson-footer-nav { grid-template-columns: 1fr;' not in lesson:
              lesson = lesson.replace(mobile_marker, mobile_insert, 1)

          if '@media print {' not in lesson:
              print_marker = '    @media (prefers-reduced-motion: reduce) {'
              print_css = '''    @media print {
            :root {
              --paper: #ffffff;
              --surface: #ffffff;
              --surface-soft: #f5f7fa;
              --ink: #101828;
              --ink-soft: #344054;
              --muted: #667085;
              --line: #cfd6df;
              --shadow: transparent;
            }
            html, body { background: var(--paper) !important; color: var(--ink) !important; }
            body { font-size: 10.5pt; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
            .site, .mobile-nav, .skip-link, nav.lesson-toc, .interactive-controls,
            .editor-panel, .quiz-actions, .lesson-footer { display: none !important; }
            main#lesson-content { width: 100%; margin: 0; padding: 0; }
            .lesson-hero { margin: 0 0 1.2rem; box-shadow: none; break-after: avoid-page; }
            .lesson-wrapper > section { margin: 1.5rem 0; }
            .panel, .concept-card, .concept-figure, .interactive-shell, .chart-card,
            .insight-card, .quiz-shell, .quiz-q, .summary-item, .practice-step {
              box-shadow: none !important;
              break-inside: avoid-page;
            }
            .table-scroll { overflow: visible; }
            table { min-width: 0; font-size: 9pt; }
            a { color: var(--ink); text-decoration: underline; }
            #pareto-chart { max-height: 6.8in; }
          }

          '''.replace('          ', '    ').replace('            ', '      ')
              lesson = lesson.replace(print_marker, print_css + print_marker, 1)

          footer_html_start = lesson.index('      <footer class="lesson-footer">')
          footer_html_end = lesson.index('      </footer>', footer_html_start) + len('      </footer>')
          footer_html = '''      <footer class="lesson-footer">
            <div class="lesson-footer-nav">
              <a class="back-category-link" href="/lessons#quality-engineering">Back to Quality Engineering</a>
              <div class="lesson-footer-next">
                <strong>Next step:</strong> Use the largest validated category as the problem statement for a focused root-cause analysis.
                <p><a href="/lessons/root-cause-analysis-5-whys-fishbone">Continue to Root Cause Analysis: 5 Whys vs Fishbone Diagram</a></p>
              </div>
            </div>
          </footer>'''
          lesson = lesson[:footer_html_start] + footer_html + lesson[footer_html_end:]
          lesson_path.write_text(lesson, encoding='utf-8')

          library = library_path.read_text(encoding='utf-8')
          row_start = library.index('<a class="lesson-row" href="lessons/understanding-pareto-chart.html"')
          row_end = library.index('</a>', row_start) + len('</a>')
          row = library[row_start:row_end]
          row = row.replace('href="lessons/understanding-pareto-chart.html"', 'href="/lessons/understanding-pareto-chart"')
          row = row.replace('<span class="lesson-action">Start lesson <span class="lesson-arrow" aria-hidden="true">&rarr;</span></span>', '<span class="lesson-action">Start lesson</span>')
          library_path.write_text(library[:row_start] + row + library[row_end:], encoding='utf-8')

          assert 'Back to Quality Engineering' in lesson
          assert '@media print {' in lesson
          assert lesson.count('Engineering Tools') >= 2
          assert 'Fishbone Diagram →' not in lesson
          assert 'href="/lessons/understanding-pareto-chart"' in library_path.read_text(encoding='utf-8')
          PY

      - name: Commit corrected lesson
        shell: bash
        run: |
          git config user.name "upskillsprint-agent"
          git config user.email "upskillsprint-agent@users.noreply.github.com"
          git add lessons/understanding-pareto-chart.html lessons.html
          if git diff --cached --quiet; then
            echo "Corrections already applied."
            exit 0
          fi
          git commit -m "Correct Pareto lesson integration and print layout"
          git push origin HEAD:lesson/pareto-fix
