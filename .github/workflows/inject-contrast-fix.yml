name: Inject site contrast fix

on:
  push:
    paths:
      - '.github/workflows/inject-contrast-fix.yml'
      - 'contrast-fix.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject contrast script into site pages
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          script_tag = '<script src="/contrast-fix.js"></script>'
          injected_expression = "'<script src=\"/contrast-fix.js\"><\\/script></body>'"
          changed = []

          for path in Path('.').rglob('*.html'):
              if any(part.startswith('.') for part in path.parts):
                  continue

              text = path.read_text(encoding='utf-8')
              original = text

              # Repair the malformed first-pass injection, if present.
              broken = re.compile(
                  r"document\.write\((finalHtml|html)\.replace\(" 
                  r"'<script src=\"/contrast-fix\.js\"></script>\s*</body>',\s*"
                  r"'<script src=\"/contrast-fix\.js\"><\\/script></body>'\)\);",
                  re.S,
              )
              text = broken.sub(
                  lambda match: "document.write(" + match.group(1) + ".replace('</body>', " + injected_expression + "));",
                  text,
              )

              # Dynamic tools replace the wrapper document after decompressing their payload.
              # Inject the contrast script into that generated document as well.
              for variable in ('finalHtml', 'html'):
                  plain = f'document.write({variable});'
                  replacement = f"document.write({variable}.replace('</body>', {injected_expression}));"
                  if plain in text:
                      text = text.replace(plain, replacement)

              # Standard pages load the repair directly. Use the final closing body tag so
              # JavaScript string literals containing </body> are never modified.
              direct_script_at_end = re.search(
                  r'<script src="/contrast-fix\.js"></script>\s*</body>\s*</html>\s*$',
                  text,
                  re.S,
              )
              if not direct_script_at_end:
                  closing_body = text.lower().rfind('</body>')
                  if closing_body >= 0:
                      text = text[:closing_body] + script_tag + '\n' + text[closing_body:]

              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          print('Updated pages:')
          for item in changed:
              print(' -', item)
          PY

      - name: Commit injected site fix
        run: |
          if git diff --quiet; then
            echo "No HTML changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html' '**/*.html'
          git commit -m "Repair and load contrast fix across site [skip ci]"
          git push
