name: Install interactive SQL lesson

on:
  push:
    branches:
      - feature/interactive-first-sql-query
    paths:
      - .github/workflows/install-interactive-sql-lesson.yml

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/interactive-first-sql-query
          fetch-depth: 0

      - name: Install lesson files and update lesson catalog
        shell: bash
        run: |
          set -euo pipefail

          cat \
            .tmp/sql-lesson.part1 \
            .tmp/sql-lesson.part2 \
            .tmp/sql-lesson.part3 \
            .tmp/sql-lesson.part4 \
            | base64 --decode > /tmp/sql-lesson-files.tar.gz

          mkdir -p lessons
          tar -xzf /tmp/sql-lesson-files.tar.gz -C lessons

          python - <<'PY'
          from pathlib import Path

          path = Path("lessons.html")
          text = path.read_text(encoding="utf-8")

          old = '''            <a class="lesson-row" href="lesson-template.html" data-lesson-item data-topic="power-bi-excel-sql" data-level="beginner" data-interactive="false" data-search="first sql query select where join database">
              <div>
                <div class="lesson-meta"><span>Beginner</span><span>10 min read</span><span>SQL</span></div>
                <h3>Writing Your First SQL Query</h3>
                <p>Learn SELECT, WHERE, and JOIN—enough SQL to start pulling your own data.</p>
              </div>
              <span class="lesson-action">Start lesson <span class="lesson-arrow" aria-hidden="true">&rarr;</span></span>
            </a>'''

          new = '''            <a class="lesson-row" href="/lessons/writing-your-first-sql-query" data-lesson-item data-topic="power-bi-excel-sql" data-level="beginner" data-interactive="true" data-search="first sql query select from where order by group by having join limit sqlite sql server database live editor practice quiz interactive">
              <div>
                <div class="lesson-meta"><span>Beginner</span><span>Interactive</span><span>35 min read</span><span>SQL</span></div>
                <h3>Writing Your First SQL Query</h3>
                <p>Write and run SQL in a live browser lab while learning SELECT, FROM, WHERE, ORDER BY, GROUP BY, HAVING, JOIN, and LIMIT.</p>
              </div>
              <span class="lesson-action">Start lesson <span class="lesson-arrow" aria-hidden="true">&rarr;</span></span>
            </a>'''

          if old not in text:
              raise SystemExit("SQL placeholder card was not found in lessons.html")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

          rm -f .tmp/sql-lesson.part1 .tmp/sql-lesson.part2 .tmp/sql-lesson.part3 .tmp/sql-lesson.part4
          rmdir .tmp 2>/dev/null || true
          rm -f .github/workflows/install-interactive-sql-lesson.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add interactive first SQL query lesson"
          git push origin HEAD:feature/interactive-first-sql-query
