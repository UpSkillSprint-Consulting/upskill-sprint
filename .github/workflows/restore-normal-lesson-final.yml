name: Restore normal distribution lesson final

on:
  push:
    branches:
      - agent/add-normal-distribution-lesson
    paths:
      - .github/workflows/restore-normal-lesson-final.yml

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-normal-distribution-lesson
          fetch-depth: 0
      - name: Restore verified lesson
        shell: bash
        run: |
          set -euo pipefail
          git checkout 1141dcf714eb5c198cbfbe22003387f6bb0af1eb -- lessons/statistics/the-normal-distribution-meet-the-bell-curve.html
          rm -f .github/workflows/restore-normal-lesson-final.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore full lesson with quiz contrast fix"
          git push origin HEAD:agent/add-normal-distribution-lesson
