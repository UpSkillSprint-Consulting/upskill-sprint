<style>
html{font-family:Arial,sans-serif;background:#f4f7fb;color:#172033}body{margin:0;min-height:100vh;display:grid;place-items:center}.loader{max-width:680px;padding:28px;text-align:center}.spinner{width:38px;height:38px;margin:0 auto 18px;border:4px solid #d4dde8;border-top-color:#0e7490;border-radius:50%;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}.detail{font-size:13px;opacity:.8;overflow-wrap:anywhere}@media(prefers-color-scheme:dark){html{background:#0a0f1a;color:#e9eef7}}

</head>
<body>
<div class="loader" id="loader"><div class="spinner" aria-hidden="true"></div><strong>Loading Grade Specification Lookup…</strong><noscript><p>JavaScript is required to use this interactive engineering tool.</p></noscript></div>
<script>
(async function(){
  const EXPECTED_PARTS=5;
  const EXPECTED_SHA256='93184e755a496d5d973bf5b2c164c72be8a4c97fecd66b213234d0de96a1e6eb';
  const toHex=buffer=>Array.from(new Uint8Array(buffer),byte=>byte.toString(16).padStart(2,'0')).join('');
  try{
    if(typeof DecompressionStream==='undefined') throw new Error('This browser does not support the required built-in decompression API.');
    const parts=window.__GSL_PAYLOAD_PARTS__||[];
    if(parts.length!==EXPECTED_PARTS) throw new Error('The application payload is incomplete. Expected '+EXPECTED_PARTS+' parts but loaded '+parts.length+'.');
    const binary=atob(parts.join(''));
    const bytes=Uint8Array.from(binary,char=>char.charCodeAt(0));
    const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    const html=await new Response(stream).text();
    if(!html.startsWith('<!DOCTYPE html')||!html.includes('Steel Grade Specification Lookup')) throw new Error('The application payload did not decode to the expected Grade Specification Lookup document.');
    if(!crypto?.subtle) throw new Error('This browser cannot verify the application checksum.');
    const actualHash=toHex(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(html)));
    if(actualHash!==EXPECTED_SHA256) throw new Error('The deployed application does not match the approved original file. Expected '+EXPECTED_SHA256+' but received '+actualHash+'.');
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    const node=document.getElementById('loader');
    if(node) node.innerHTML='<h1>Unable to load the tool</h1><p>'+String(error.message||error)+'</p><p class="detail">Source verification: '+EXPECTED_SHA256+'</p><p><a href="/engineering-tools">Back to Engineering Tools</a></p>';
    console.error(error);
  }
}());
</script>
</body>
</html>
